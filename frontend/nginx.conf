server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE needs buffering disabled
    location /api/applications/ {
        proxy_pass http://backend:5001/api/applications/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Webhook echo
    location /webhook/ {
        proxy_pass http://backend:5001/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health / metrics
    location ~ ^/(healthz|metrics)$ {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
    }
}
